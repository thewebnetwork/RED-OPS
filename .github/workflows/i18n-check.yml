# GitHub Actions workflow for i18n translation coverage
# This runs on every pull request to ensure no translation regressions

name: i18n Check

on:
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/src/i18n/**'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/src/**'
      - 'frontend/src/i18n/**'

jobs:
  i18n-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run i18n CI check
        working-directory: frontend
        run: npm run i18n:ci
        continue-on-error: true

      - name: Run full i18n audit (informational)
        working-directory: frontend
        run: npm run i18n:audit || true
        continue-on-error: true

  i18n-strict:
    runs-on: ubuntu-latest
    # This job runs in strict mode but is allowed to fail
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run strict i18n check
        working-directory: frontend
        env:
          I18N_STRICT: 'true'
          I18N_VERBOSE: 'true'
        run: npm run i18n:ci
